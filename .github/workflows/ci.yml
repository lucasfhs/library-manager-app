name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gomes_library_system
          POSTGRES_USER: gomes_library_system_user
          POSTGRES_PASSWORD: library_manager_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gomes_library_system_user -d gomes_library_system"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: gomes_library_system
      DB_USER: gomes_library_system_user
      DB_PASSWORD: library_manager_password
      DB_SSL: "false"
      SECRET_KEY: integration-test-secret
      PGPASSWORD: library_manager_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Initialize test database
        run: psql -h localhost -U "$DB_USER" -d "$DB_NAME" -f backend/database/init.sql
      - run: npm ci
        working-directory: backend
      - run: npm run test:integration
        working-directory: backend

  compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
